# /etc/nginx/sites-available/ai-task-manager
# シンボリックリンク: ln -s /etc/nginx/sites-available/ai-task-manager /etc/nginx/sites-enabled/

server {
    listen 80;
    server_name task.isl-mentor.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name task.isl-mentor.com;

    ssl_certificate     /etc/letsencrypt/live/task.isl-mentor.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/task.isl-mentor.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 10M;

    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}
